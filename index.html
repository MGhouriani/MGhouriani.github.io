<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0F14">
<meta name="description" content="Photon Journal — SMC Trading Journal">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Photon">
<title>Photon Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.4/dexie.min.js"></script>
<style>
/* ============================================================
   Trading JOURNAL — Complete Styles
   ============================================================ */
:root {
  --bg:      #0B0F14;
  --card:    #131A22;
  --card2:   #0F1520;
  --border:  #1D2733;
  --border2: #243040;
  --primary: #FFA500;
  --profit:  #00E676;
  --loss:    #FF5252;
  --warn:    #FFD600;
  --text:    #E8EDF2;
  --text2:   #8A9BB0;
  --text3:   #4A5A6B;
  --nav-h:   64px;
  --radius:  10px;
  --radius2: 6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'Inter',BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  line-height:1.5;-webkit-font-smoothing:antialiased;
}
body[dir="rtl"]{text-align:right;font-family:'Vazirmatn','Tahoma',sans-serif}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto}
.page{display:none;flex-direction:column;min-height:calc(100vh - var(--nav-h));padding-bottom:calc(var(--nav-h) + 16px);animation:fadeIn .2s ease}
.page.active{display:flex}

/* NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(13,20,30,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;height:var(--nav-h);padding:0 4px;
  max-width:900px;margin:0 auto;
}
@media(min-width:900px){.bottom-nav{left:50%;transform:translateX(-50%)}}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);
  font-size:10px;font-weight:500;transition:color .15s;padding:6px 2px;position:relative;
  font-family:inherit;
}
.nav-item svg{width:20px;height:20px;stroke-width:1.8}
.nav-item.active{color:var(--primary)}
.nav-item.active::before{content:'';position:absolute;top:0;left:18%;right:18%;height:2px;background:var(--primary);border-radius:0 0 3px 3px}
.nav-add{display:flex;align-items:center;gap:5px;background:var(--primary);border-radius:14px;padding:7px 14px;font-size:12px;font-weight:700;color:#000}
.nav-add svg{width:14px;height:14px;stroke:#000;stroke-width:3}

/* HEADER */
.page-header{
  padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  background:rgba(11,15,20,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-subtitle{font-size:11px;color:var(--text2);margin-top:1px}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:17px;font-weight:800;letter-spacing:-.5px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-sm{padding:11px 13px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 16px}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--kpi-color,var(--primary)),transparent)}
.kpi-label{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.kpi-value{font-size:21px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:3px}

/* SECTION */
.section{padding:0 16px 20px}
.section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--primary);color:#000}
.btn-primary:hover{background:#00E676}
.btn-primary:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;pointer-events:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-danger{background:rgba(255,82,82,.10);color:var(--loss);border:1px solid rgba(255,82,82,.20)}
.btn-danger:hover{background:rgba(255,82,82,.18)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:6px}
.btn-full{width:100%}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;font-size:16px}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;display:block}
.form-control{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.form-control:focus{border-color:var(--primary)}
.form-control::placeholder{color:var(--text3)}
textarea.form-control{resize:vertical;min-height:84px}
select.form-control{appearance:none;cursor:pointer}

/* CHIPS */
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;font-family:inherit}
.chip.selected{background:rgba(0,200,83,.10);border-color:var(--primary);color:var(--primary)}
.dir-chip{flex:1;text-align:center;padding:14px;border-radius:var(--radius2);border:2px solid var(--border);background:var(--card2);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;user-select:none}
.dir-chip.buy.selected{border-color:var(--profit);background:rgba(0,230,118,.07);color:var(--profit)}
.dir-chip.sell.selected{border-color:var(--loss);background:rgba(255,82,82,.07);color:var(--loss)}
.dir-chip:not(.selected){color:var(--text2)}

/* CHECKLIST */
.checklist-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer;margin-bottom:8px;transition:all .15s;user-select:none}
.checklist-item.checked{border-color:rgba(0,200,83,.25);background:rgba(0,200,83,.04)}
.checkbox{width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid var(--border2);background:var(--card2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.checkbox.checked{background:var(--primary);border-color:var(--primary)}
.checkbox svg{width:11px;height:11px;stroke:#000;stroke-width:3;display:none}
.checkbox.checked svg{display:block}
.checklist-label{font-size:13px;color:var(--text2);transition:color .15s}
.checklist-item.checked .checklist-label{color:var(--text)}

/* WIZARD */
.wizard-steps-bar{display:flex;gap:4px;padding:0 16px 14px}
.wizard-dot{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.wizard-dot.done{background:var(--primary)}
.wizard-dot.active{background:rgba(0,200,83,.45)}
.wizard-nav{position:sticky;bottom:var(--nav-h);z-index:5;display:flex;gap:10px;padding:12px 16px 16px;background:linear-gradient(to top,var(--bg) 75%,transparent)}

/* TOGGLE */
.toggle-group{display:flex;background:var(--card2);border-radius:8px;padding:3px;gap:3px}
.toggle-opt{flex:1;text-align:center;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text3);user-select:none;font-family:inherit}
.toggle-opt.yes-active{color:var(--profit);background:rgba(0,200,83,.10)}
.toggle-opt.no-active{color:var(--loss);background:rgba(255,82,82,.10)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:rgba(0,230,118,.10);color:var(--profit)}
.badge-red{background:rgba(255,82,82,.10);color:var(--loss)}
.badge-yellow{background:rgba(255,214,0,.10);color:var(--warn)}
.badge-gray{background:rgba(138,155,176,.10);color:var(--text2)}
.badge-blue{background:rgba(21,101,192,.14);color:#64B5F6}

/* TRADE ITEM */
.trade-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,transform .1s}
.trade-item:active{transform:scale(.99)}
.trade-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.trade-item-asset{font-size:15px;font-weight:700}
.trade-item-r{font-size:19px;font-weight:800}
.trade-item-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.trade-item-date{font-size:10px;color:var(--text3);margin-inline-start:auto}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius2);padding:9px 12px;margin:10px 16px}
.search-bar svg{width:15px;height:15px;color:var(--text3);flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:14px;flex:1;font-family:inherit}
.search-bar input::placeholder{color:var(--text3)}

/* SORT BAR */
.sort-bar{display:flex;gap:7px;padding:4px 16px 10px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.sort-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(0,200,83,.06)}

/* TABS */
.tab-bar{display:flex;overflow-x:auto;padding:0 16px;margin-bottom:14px;border-bottom:1px solid var(--border);scrollbar-width:none;gap:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* CHART */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px}
canvas{display:block;width:100%}

/* PROGRESS */
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* STAT TABLE */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:12px;color:var(--text2)}
.stat-val{font-size:13px;font-weight:600}

/* INSIGHT */
.insight-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.insight-icon{width:36px;height:36px;min-width:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}

/* IMG UPLOAD */
.img-upload{border:2px dashed var(--border2);border-radius:var(--radius);padding:22px;text-align:center;cursor:pointer;transition:border-color .15s;color:var(--text3)}
.img-upload:hover{border-color:var(--primary)}
.img-upload svg{display:block;margin:0 auto 8px}
.img-preview{width:100%;border-radius:var(--radius2);margin-top:10px;max-height:220px;object-fit:cover;display:block}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;transform:translateY(36px);transition:transform .26s cubic-bezier(.32,.72,0,1);padding:20px 16px 48px}
.modal-backdrop.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:700}
.modal-subtitle{font-size:12px;color:var(--text2);margin-top:2px}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 20px;z-index:300;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.45)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(0,200,83,.4)}
.toast.error{border-color:rgba(255,82,82,.4)}

/* EMPTY */
.empty-state{text-align:center;padding:56px 28px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:46px;margin-bottom:6px}
.empty-title{font-size:16px;font-weight:600}
.empty-sub{font-size:13px;color:var(--text2);line-height:1.55;max-width:260px}

/* MISTAKE TAG */
.mistake-tag{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;font-family:inherit}
.mistake-tag.selected{background:rgba(255,82,82,.09);border-color:rgba(255,82,82,.4);color:var(--loss)}

/* INFO BOX */
.info-box{padding:12px 14px;background:rgba(0,200,83,.05);border:1px solid rgba(0,200,83,.14);border-radius:var(--radius);font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:14px}
.info-box-label{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:3px}

/* UTILITIES */
.divider{height:1px;background:var(--border);margin:14px 0}
.text-profit{color:var(--profit)}.text-loss{color:var(--loss)}.text-warn{color:var(--warn)}.text-muted{color:var(--text2)}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-14{margin-top:14px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-10{margin-bottom:10px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.p-16{padding:0 16px}.review-field{margin-bottom:18px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .22s ease forwards}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::selection{background:rgba(0,200,83,.25)}
</style>
</head>
<body>
<div id="app">
  <div id="page-dashboard" class="page active"></div>
  <div id="page-history"   class="page"></div>
  <div id="page-new-trade" class="page"></div>
  <div id="page-analytics" class="page"></div>
  <div id="page-review"    class="page"></div>
  <div id="page-settings"  class="page"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span id="nav-label-dashboard">Dashboard</span>
    </button>
    <button class="nav-item" id="nav-history" onclick="navigate('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 14 2 2 4-4"/></svg>
      <span id="nav-label-history">Trades</span>
    </button>
    <button class="nav-item" onclick="navigate('new-trade')">
      <div class="nav-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="nav-label-log">Log</span>
      </div>
    </button>
    <button class="nav-item" id="nav-analytics" onclick="navigate('analytics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <span id="nav-label-analytics">Analytics</span>
    </button>
    <button class="nav-item" id="nav-review" onclick="navigate('review')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span id="nav-label-review">Review</span>
    </button>
  </nav>
</div>

<div class="modal-backdrop" id="trade-modal" onclick="closeTradeModal(event)">
  <div class="modal" id="trade-modal-content"></div>
</div>
<div class="toast" id="toast"></div>

function getStats(trades){
  if(!trades||!trades.length)return{total:0,wins:0,losses:0,winRate:0,avgR:0,netR:0,profitFactor:0,expectancy:0,currentStreak:0,longestWin:0,longestLoss:0,maxDrawdown:0,bestSetup:'-',bestSession:'-',avgWin:0,avgLoss:0};
  const wins=trades.filter(t=>t.result>0),losses=trades.filter(t=>t.result<0);
  const winR=wins.reduce((s,t)=>s+t.result,0),lossR=Math.abs(losses.reduce((s,t)=>s+t.result,0));
  const netR=trades.reduce((s,t)=>s+t.result,0),wr=wins.length/trades.length*100;
  const avgWin=wins.length?winR/wins.length:0,avgLoss=losses.length?lossR/losses.length:0;
  const pf=lossR>0?winR/lossR:winR>0?999:0,exp=(wr/100*avgWin)-((1-wr/100)*avgLoss);
  const sorted=[...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let cW=0,cL=0,mW=0,mL=0;
  sorted.forEach(t=>{if(t.result>0){cW++;cL=0;mW=Math.max(mW,cW)}else{cL++;cW=0;mL=Math.max(mL,cL)}});
  const last=sorted[sorted.length-1];
  const curStr=last?(last.result>0?cW:-cL):0;
  let peak=0,dd=0,eq=0;
  sorted.forEach(t=>{eq+=t.result;if(eq>peak)peak=eq;const d=peak-eq;if(d>dd)dd=d});
  const sm={};trades.forEach(t=>{if(!sm[t.setup])sm[t.setup]={w:0,n:0};sm[t.setup].n++;if(t.result>0)sm[t.setup].w++});
  let bS='-',bWR=-1;Object.entries(sm).forEach(([k,v])=>{const w=v.w/v.n;if(w>bWR&&v.n>=2){bWR=w;bS=k}});
  const sesM={};trades.forEach(t=>{if(!sesM[t.session])sesM[t.session]={r:0};sesM[t.session].r+=t.result});
  let bSes='-',bSR=-999;Object.entries(sesM).forEach(([k,v])=>{if(v.r>bSR){bSR=v.r;bSes=k}});
  return{total:trades.length,wins:wins.length,losses:losses.length,winRate:wr,avgR:netR/trades.length,netR,profitFactor:pf,expectancy:exp,currentStreak:curStr,longestWin:mW,longestLoss:mL,maxDrawdown:dd,bestSetup:bS,bestSession:bSes,avgWin,avgLoss};
}
function grpMap(trades,field){
  const m={};trades.forEach(t=>{const k=t[field]||'?';if(!m[k])m[k]={w:0,n:0,r:0};m[k].n++;if(t.result>0)m[k].w++;m[k].r+=t.result});return m;
}
function setupStats(trades){return Object.entries(grpMap(trades,'setup')).map(([name,v])=>({name,wr:+(v.w/v.n*100).toFixed(1),netR:+v.r.toFixed(2),count:v.n})).sort((a,b)=>b.wr-a.wr)}
function sessStats(trades){return Object.entries(grpMap(trades,'session')).map(([name,v])=>({name,wr:+(v.w/v.n*100).toFixed(1),netR:+v.r.toFixed(2),count:v.n,wins:v.w,losses:v.n-v.w})).sort((a,b)=>b.netR-a.netR)}
function dayStats(trades){
  const l=T[App.lang];
  const m={};
  trades.forEach(tr=>{const idx=new Date(tr.date).getDay(),k=idx;if(!m[k])m[k]={w:0,n:0,r:0,idx};m[k].n++;if(tr.result>0)m[k].w++;m[k].r+=tr.result});
  return Object.entries(m).map(([idx,v])=>({name:l.days[idx],wr:+(v.w/v.n*100).toFixed(1),netR:+v.r.toFixed(2),count:v.n,idx:+idx})).sort((a,b)=>a.idx-b.idx);
}
function mistakeStats(trades){const m={};trades.forEach(t=>(t.mistakes||[]).forEach(x=>{m[x]=(m[x]||0)+1}));return Object.entries(m).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count)}
function monthlyStats(trades){const m={};trades.forEach(t=>{const k=(t.date||'').slice(0,7);if(!m[k])m[k]={w:0,n:0,r:0};m[k].n++;if(t.result>0)m[k].w++;m[k].r+=t.result});return Object.entries(m).map(([month,v])=>({month,wr:+(v.w/v.n*100).toFixed(1),netR:+v.r.toFixed(2),count:v.n})).sort((a,b)=>a.month.localeCompare(b.month))}
function scoreDistrib(trades){return[{l:'0–39',min:0,max:39},{l:'40–59',min:40,max:59},{l:'60–79',min:60,max:79},{l:'80–100',min:80,max:100}].map(b=>({...b,count:trades.filter(t=>t.score>=b.min&&t.score<=b.max).length}))}
function edgeInsights(trades){
  const l=t();if(trades.length<3)return[];const ins=[];
  const ss=setupStats(trades).filter(s=>s.count>=2);
  if(ss.length>=2){ins.push({icon:'🏆',color:'rgba(0,200,83,.15)',title:l.edgeTitle1,text:`${ss[0].name}: ${ss[0].wr}% WR`});if(ss[ss.length-1].wr<ss[0].wr-15)ins.push({icon:'⚠️',color:'rgba(255,82,82,.12)',title:l.edgeTitle2,text:`${ss[ss.length-1].name}: ${ss[ss.length-1].wr}% WR`})}
  const ses=sessStats(trades);if(ses.length>=2)ins.push({icon:'⏰',color:'rgba(21,101,192,.15)',title:l.edgeTitle3,text:`${ses[0].name}: +${ses[0].netR}R (${ses[0].wr}% WR)`});
  const bY=trades.filter(t=>t.biasCorrect==='yes'),bN=trades.filter(t=>t.biasCorrect==='no');
  if(bY.length>=2&&bN.length>=2){const yWR=bY.filter(t=>t.result>0).length/bY.length*100,nWR=bN.filter(t=>t.result>0).length/bN.length*100;if(yWR>nWR+10)ins.push({icon:'📊',color:'rgba(255,214,0,.12)',title:l.edgeTitle4,text:`✓ ${yWR.toFixed(0)}% WR / ✗ ${nWR.toFixed(0)}% WR`})}
  const hi=trades.filter(t=>t.score>=80),lo=trades.filter(t=>t.score<60);
  if(hi.length>=2&&lo.length>=2){const hW=hi.filter(t=>t.result>0).length/hi.length*100,lW=lo.filter(t=>t.result>0).length/lo.length*100;ins.push({icon:'🎯',color:'rgba(0,200,83,.10)',title:l.edgeTitle5,text:`Score≥80: ${hW.toFixed(0)}% / Score<60: ${lW.toFixed(0)}%`})}
  const ms=mistakeStats(trades);if(ms.length&&ms[0].count>=2)ins.push({icon:'🔁',color:'rgba(255,82,82,.10)',title:l.edgeTitle6,text:`"${ms[0].name}" — ${ms[0].count}x`});
  const st=getStats(trades);if(st.expectancy>0)ins.push({icon:'✨',color:'rgba(0,200,83,.08)',title:l.edgeTitle7,text:`+${st.expectancy.toFixed(2)}R ${l.perTrade}`});
  return ins;
}

// CHARTS
// ============================================================
const CC={profit:'#00E676',loss:'#FF5252',warn:'#FFD600',primary:'#00C853',txt:'rgba(138,155,176,.7)',grid:'rgba(255,255,255,.06)',zero:'rgba(255,255,255,.12)'};
function cvs(id,H){const c=document.getElementById(id);if(!c)return null;const W=c.offsetWidth||340,dpr=devicePixelRatio||1;c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';const ctx=c.getContext('2d');ctx.scale(dpr,dpr);return{ctx,W,H}}
function drawEquity(id,trades){
  const c=cvs(id,140);if(!c)return;const{ctx,W,H}=c;
  const sorted=[...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let eq=0;const pts=[0,...sorted.map(t=>{eq+=t.result;return+eq.toFixed(2)})];
  if(pts.length<2)return;
  const pad={t:12,r:12,b:24,l:36},iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const min=Math.min(...pts),max=Math.max(...pts),rng=max-min||1;
  const xP=i=>pad.l+(i/(pts.length-1))*iW,yP=v=>pad.t+(1-(v-min)/rng)*iH;
  [0,.25,.5,.75,1].forEach(f=>{const y=pad.t+f*iH;ctx.strokeStyle=CC.grid;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke()});
  const zY=yP(0);ctx.strokeStyle=CC.zero;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,zY);ctx.lineTo(W-pad.r,zY);ctx.stroke();ctx.setLineDash([]);
  const fin=pts[pts.length-1],grad=ctx.createLinearGradient(0,pad.t,0,H);
  grad.addColorStop(0,fin>=0?'rgba(0,200,83,.22)':'rgba(255,82,82,.22)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(xP(0),yP(pts[0]));pts.forEach((v,i)=>ctx.lineTo(xP(i),yP(v)));
  ctx.lineTo(xP(pts.length-1),H-pad.b);ctx.lineTo(xP(0),H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(xP(0),yP(pts[0]));pts.forEach((v,i)=>ctx.lineTo(xP(i),yP(v)));
  ctx.strokeStyle=fin>=0?CC.profit:CC.loss;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  ctx.fillStyle=CC.txt;ctx.font='9px system-ui';ctx.textAlign='right';
  ctx.fillText(max.toFixed(1)+'R',pad.l-3,pad.t+6);ctx.fillText(min.toFixed(1)+'R',pad.l-3,H-pad.b+2);ctx.fillText('0R',pad.l-3,zY+3);
}
function drawBars(id,labels,vals,colors,H){
  const c=cvs(id,H||160);if(!c)return;const{ctx,W}=c;if(!labels.length)return;
  const pad={t:22,r:10,b:32,l:10},iW=W-pad.l-pad.r,iH=H-pad.t-pad.b,mA=Math.max(...vals.map(Math.abs),1),bW=iW/labels.length;
  ctx.strokeStyle=CC.zero;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t+iH);ctx.lineTo(W-pad.r,pad.t+iH);ctx.stroke();
  vals.forEach((v,i)=>{
    const bh=Math.abs(v)/mA*iH,x=pad.l+i*bW+bW*.12,bwi=bW*.76,y=pad.t+iH-bh;
    ctx.fillStyle=colors[i]||CC.primary;ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(x,y,bwi,bh,[4,4,0,0]);else ctx.rect(x,y,bwi,bh);ctx.fill();
    ctx.fillStyle=CC.txt;ctx.font='9px system-ui';ctx.textAlign='center';
    const mid=pad.l+i*bW+bW/2;
    ctx.fillText((v>0?'+':'')+(Number.isInteger(v)?v:v.toFixed(1)),mid,y-4);
    ctx.fillText((labels[i]+'').slice(0,8),mid,H-pad.b+14);
  });
}

function exportData(fmt){
  const trades=App.trades;
  if(fmt==='json'){const b=new Blob([JSON.stringify(trades,null,2)],{type:'application/json'});dlBlob(b,'photon-'+Date.now()+'.json')}
  else{const h=['id','date','asset','direction','session','bias','context','setup','result','score','riskAmount','notes','biasCorrect','structureCorrect','pdArrayEntry','liquidityId','avoidedFomo','riskMgmt','mistakes'],rows=trades.map(tr=>h.map(x=>{const v=tr[x];return Array.isArray(v)?'"'+v.join(';')+'"':typeof v==='string'&&v.includes(',')?'"'+v+'"':v??''}).join(','));dlBlob(new Blob([[h.join(','),...rows].join('\n')],{type:'text/csv'}),'photon-'+Date.now()+'.csv')}
  toast(t().exported,'success');
}
function dlBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href)}
async function importData(input){
  const file=input.files[0];if(!file)return;const l=t();
  try{const txt=await file.text(),data=JSON.parse(txt);if(!Array.isArray(data)){toast(l.invalidFormat,'error');return}
    await db.trades.clear();const cl=data.map(tr=>{const c={...tr};delete c.id;return c});await db.trades.bulkAdd(cl);
    App.trades=await db.trades.orderBy('date').reverse().toArray();toast(data.length+' '+l.importSuccess,'success');renderSettings()
  }catch(e){toast(l.importFailed+e.message,'error')}
}

  document.getElementById('nav-label-log').textContent=l.log;
  document.getElementById('nav-label-analytics').textContent=l.analytics;
  document.getElementById('nav-label-review').textContent=l.review;
}

// ============================================================
// TOAST
// ============================================================
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.innerHTML=`<span style="color:${type==='success'?'var(--profit)':'var(--loss)'};font-weight:700">${type==='success'?'✓':'✗'}</span> ${msg}`;
  el.className=`toast ${type} show`;setTimeout(()=>el.classList.remove('show'),3200);
}

// ============================================================
// INIT
// ============================================================
async function init(){
  const saved=await db.settings.get('settings');
  if(saved){App.settings={...App.settings,...saved.value};App.lang=saved.value?.language||'en'}
  setLang(App.lang);App.trades=await db.trades.orderBy('date').reverse().toArray();
  updateNavLabels();renderDashboard();
}
init();
</script>
</body>
</html>
